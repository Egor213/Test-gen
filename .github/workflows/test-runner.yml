name: Test Local Runner

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "GitHub repository (user/repo)"
        required: true
        default: "user/repo

jobs:
  test:
    runs-on: [self-hosted, Windows]  # или [self-hosted] если без лейбла Windows
    steps:
      - name: test
        run: |
          python C:\Diplom\Test-gen\test.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ github.event.inputs.repo }}
