name: Test Local Runner

on:
  workflow_dispatch:  # запуск вручную из GitHub UI
  push:                # можно запустить при любом push

jobs:
  test:
    runs-on: [self-hosted, Windows]  # или [self-hosted] если без лейбла Windows
    steps:
      - name: Show current directory (PowerShell)
        shell: pwsh
        run: |
          echo "Current directory:"
          pwd
