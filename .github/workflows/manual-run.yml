name: Manual Run main.py

on:
  workflow_dispatch:

jobs:
  execute-main:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python (если нужен)
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run main.py
        run: python main.py